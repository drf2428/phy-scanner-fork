#cloud-config
# Physeter Scanner Appliance — First Boot Configuration
#
# When deploying this appliance, provide the following user-data:
#
# PHY_API_URL: the Physeter platform URL (e.g. https://app.physeter.cloud)
# PHY_TOKEN: the appliance service token (generated in the Admin wizard)
#
# Example user-data (pass to your hypervisor):
# ---
# phy_scanner:
#   api_url: "https://app.physeter.cloud"
#   token: "your-token-here"

write_files:
  - path: /etc/phy-scanner/config.env
    owner: root:root
    permissions: '0600'
    content: |
      # Auto-generated by cloud-init
      PHY_API_URL={{ phy_scanner.api_url }}
      PHY_TOKEN={{ phy_scanner.token }}
      PHY_APPLIANCE_VERSION=0.1.0
      PHY_LOG_LEVEL=INFO
      PHY_DATA_DIR=/var/lib/phy-scanner

runcmd:
  - mkdir -p /var/lib/phy-scanner
  - chown phy-scanner:phy-scanner /var/lib/phy-scanner
  - systemctl daemon-reload
  - systemctl enable phy-scanner-agent
  - systemctl start phy-scanner-agent
